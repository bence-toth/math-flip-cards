<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Flip Cards</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <div class="topbar">
      <div class="toolbar" role="group" aria-label="Operation mode">
        <button class="mode-btn active" data-mode="add" aria-pressed="true">only +</button>
        <button class="mode-btn" data-mode="multiply" aria-pressed="false">only ×</button>
        <button class="mode-btn" data-mode="both" aria-pressed="false">both + and ×</button>
      </div>

      <div class="toolbar" role="group" aria-label="Difficulty">
        <button class="diff-btn active" data-diff="easy" aria-pressed="true">Easy</button>
        <button class="diff-btn" data-diff="medium" aria-pressed="false">Medium</button>
        <button class="diff-btn" data-diff="hard" aria-pressed="false">Hard</button>
      </div>
    </div>

    <div
      id="board"
      class="board"
      role="grid"
      aria-label="Math flip card board"
    ></div>
  </main>

  <script src="game.js"></script>
</body>
</html>
